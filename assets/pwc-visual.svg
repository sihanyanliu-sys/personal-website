<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">PwC audit and financial review workflow visual</title>
  <desc id="desc">A clean finance workflow illustration showing audit evidence, financial checks, risk notes, and working paper review.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf6"/>
      <stop offset="1" stop-color="#eef5f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#15211f" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f7f4ec"/>
  <path d="M0 112h1200M0 224h1200M0 336h1200M0 448h1200M0 560h1200M0 672h1200M150 0v760M300 0v760M450 0v760M600 0v760M750 0v760M900 0v760M1050 0v760" stroke="#15211f" stroke-opacity=".07"/>
  <rect x="72" y="72" width="1056" height="616" rx="18" fill="url(#paper)" stroke="#15211f" stroke-opacity=".14" filter="url(#shadow)"/>
  <text x="112" y="138" fill="#15211f" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="800">PwC | Financial Review Workflow</text>
  <text x="112" y="174" fill="#66736f" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="600">Audit evidence collection · account reconciliation · risk note tracking</text>
  <rect x="112" y="228" width="308" height="354" rx="12" fill="#ffffff" stroke="#15211f" stroke-opacity=".13"/>
  <text x="138" y="276" fill="#15211f" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">Working Papers</text>
  <g font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="138" y="318" width="232" height="18" rx="9" fill="#d85b2f" opacity=".92"/>
    <text x="138" y="368" fill="#66736f">Revenue testing</text>
    <rect x="138" y="388" width="178" height="18" rx="9" fill="#f0a44b"/>
    <text x="138" y="438" fill="#66736f">Expense sampling</text>
    <rect x="138" y="458" width="210" height="18" rx="9" fill="#0d8c8c"/>
    <text x="138" y="508" fill="#66736f">Balance confirmation</text>
    <rect x="138" y="528" width="254" height="18" rx="9" fill="#2d64c8"/>
  </g>
  <rect x="474" y="228" width="278" height="354" rx="12" fill="#15211f"/>
  <text x="504" y="276" fill="#ffffff" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">Control Matrix</text>
  <g fill="none" stroke-linecap="round" stroke-width="6">
    <path d="M518 346l42 42 92-112" stroke="#f0a44b"/>
    <path d="M518 454l42 42 92-112" stroke="#0d8c8c"/>
  </g>
  <g font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800">
    <text x="504" y="408" fill="#ffffff" opacity=".8">Evidence matched</text>
    <text x="504" y="516" fill="#ffffff" opacity=".8">Variance explained</text>
  </g>
  <rect x="806" y="228" width="282" height="354" rx="12" fill="#ffffff" stroke="#15211f" stroke-opacity=".13"/>
  <text x="834" y="276" fill="#15211f" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">Risk Notes</text>
  <circle cx="858" cy="342" r="11" fill="#d85b2f"/>
  <circle cx="858" cy="420" r="11" fill="#f0a44b"/>
  <circle cx="858" cy="498" r="11" fill="#0d8c8c"/>
  <g fill="#66736f" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700">
    <text x="888" y="348">Materiality threshold</text>
    <text x="888" y="426">Supporting documents</text>
    <text x="888" y="504">Final review status</text>
  </g>
  <path d="M420 406h54M752 406h54" stroke="#15211f" stroke-opacity=".34" stroke-width="4" stroke-linecap="round"/>
  <path d="M462 392l18 14-18 14M794 392l18 14-18 14" fill="none" stroke="#15211f" stroke-opacity=".34" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="640" fill="#15211f" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800">Structured audit support: verify, reconcile, document, and communicate.</text>
</svg>

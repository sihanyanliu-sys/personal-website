<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">CITIC Construction Securities research and market analysis visual</title>
  <desc id="desc">A securities research illustration showing market monitor, company valuation model, and investment memo outputs.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10201f"/>
      <stop offset="1" stop-color="#173a39"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#15211f" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f7f4ec"/>
  <path d="M0 95h1200M0 190h1200M0 285h1200M0 380h1200M0 475h1200M0 570h1200M0 665h1200M120 0v760M240 0v760M360 0v760M480 0v760M600 0v760M720 0v760M840 0v760M960 0v760M1080 0v760" stroke="#15211f" stroke-opacity=".07"/>
  <rect x="70" y="70" width="1060" height="620" rx="18" fill="#fffdf6" stroke="#15211f" stroke-opacity=".14" filter="url(#shadow)"/>
  <rect x="96" y="96" width="1008" height="140" rx="12" fill="url(#panel)"/>
  <text x="130" y="154" fill="#ffffff" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="800">CITIC Securities | Research Desk</text>
  <text x="130" y="196" fill="#cfe3dd" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700">Market data tracking · company fundamentals · valuation memo</text>
  <rect x="112" y="284" width="306" height="316" rx="12" fill="#ffffff" stroke="#15211f" stroke-opacity=".13"/>
  <text x="138" y="332" fill="#15211f" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">Market Monitor</text>
  <polyline points="142,520 176,490 218,504 260,450 310,462 352,392 390,414" fill="none" stroke="#2d64c8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="142,548 176,538 218,526 260,512 310,486 352,468 390,430" fill="none" stroke="#0d8c8c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g stroke="#15211f" stroke-opacity=".12">
    <path d="M142 372h248M142 424h248M142 476h248M142 528h248"/>
  </g>
  <rect x="462" y="284" width="276" height="316" rx="12" fill="#15211f"/>
  <text x="492" y="332" fill="#ffffff" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">Valuation Model</text>
  <g font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800">
    <text x="492" y="392" fill="#cfe3dd">Revenue growth</text>
    <rect x="492" y="414" width="178" height="16" rx="8" fill="#2d64c8"/>
    <text x="492" y="472" fill="#cfe3dd">Margin scenario</text>
    <rect x="492" y="494" width="212" height="16" rx="8" fill="#0d8c8c"/>
    <text x="492" y="552" fill="#cfe3dd">Target range</text>
    <rect x="492" y="574" width="136" height="16" rx="8" fill="#e86d3c"/>
  </g>
  <rect x="782" y="284" width="306" height="316" rx="12" fill="#ffffff" stroke="#15211f" stroke-opacity=".13"/>
  <text x="810" y="332" fill="#15211f" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">Investment Memo</text>
  <g font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700" fill="#66736f">
    <text x="810" y="394">1. Industry catalyst</text>
    <text x="810" y="450">2. Company comparison</text>
    <text x="810" y="506">3. Earnings sensitivity</text>
    <text x="810" y="562">4. Recommendation logic</text>
  </g>
  <circle cx="1044" cy="382" r="13" fill="#0d8c8c"/>
  <circle cx="1044" cy="438" r="13" fill="#2d64c8"/>
  <circle cx="1044" cy="494" r="13" fill="#f0a44b"/>
  <circle cx="1044" cy="550" r="13" fill="#e86d3c"/>
  <path d="M418 442h44M738 442h44" stroke="#15211f" stroke-opacity=".34" stroke-width="4" stroke-linecap="round"/>
  <path d="M450 428l18 14-18 14M770 428l18 14-18 14" fill="none" stroke="#15211f" stroke-opacity=".34" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="650" fill="#15211f" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800">From market signals to company logic, then into a clear research memo.</text>
